<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title data-i18n="details_title">Details</title>
    <link rel="stylesheet" type="text/css" media="screen" href="message.css">
</head>

<body>
<div class="grid-container">
    <div class="header" data-i18n="subject_label"></div>
    <div id="subject" class="content"></div>

    <div class="header" data-i18n="from_label"></div>
    <div id="from" class="content"></div>

    <div class="header" data-i18n="received_header_label"></div>
    <div id="received" class="content"></div>

    <div class="header" data-i18n="classification_details_label"></div>
    <div id="details" class="content"></div>

    <div class="content">
            <span id="subject"></span>
            <span id="classification"></span> 
    </div>
    <div class="button-bar">
        <button id="reply-button" data-i18n="reply_button"></button>
        <button id="summary-button" data-i18n="summary_button"></button>
        <button id="translate-button" data-i18n="translate_button"></button>
    </div>
    <div id="summary-result" class="summary-result"></div>
    <div id="translate-result" class="summary-result"></div>
</div>


<script type="module" src="message.js"></script>
<script src="../i18n.js"></script>
</body>

</html>
